<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homdly - Propiedades</title>
  <meta name="title" content="Homdly">
  <meta name="description" content="xxxx">

  <link rel="shortcut icon" href="./assets/images/iconoLogo.ico" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
  
  <!-- Font Awesome para los íconos de redes y usuario -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
  

  <link rel="stylesheet" href="./assets/css/styleFooter.css">
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <link rel="stylesheet" href="./assets/css/anuncio.css">

  
</head>
<body>

  <header class="header"></header>

  <main>
    <section class="properties-section">
      <div class="container">

        <!-- ===== TABS ===== -->
        <div class="tabs">
          <button class="tab active" data-tab="arriendo" onclick="setTab(this)">Arriendos</button>
          <button class="tab tab-compra" data-tab="compra" onclick="setTab(this)">Compra</button>
        </div>

        <!-- ===== FILTROS ===== -->
        <div class="filter-bar">
          <div class="filter-select">
            <select id="dep" onchange="actualizarMunicipios()">
              <option value="">Departamentos</option>
              <option>Antioquia</option>
              <option>Cundinamarca</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="mun">
              <option value="">Municipio</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="barrio">
              <option value="">Barrios</option>
              <option>El Poblado</option>
              <option>Laureles</option>
              <option>Chapinero</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="tipo">
              <option value="">Tipo de propiedad</option>
              <option>Apartamento</option>
              <option>Casa</option>
              <option>Lote</option>
            </select>
          </div>
          <input type="text" id="codigo" placeholder="Código">
          <button class="btn-buscar" onclick="buscar()">Buscar</button>
        </div>

        <!-- ===== TÍTULO ===== -->
        <h2 class="section-title">Propiedades disponibles</h2>

        <!-- ===== GRID ===== -->
        <div class="properties-grid" id="propertiesGrid">

          <!-- CARD .23 – local comercia / Venta -->
          <div class="property-card" data-modalidad="compra" data-dep="Antioquia" data-mun="Medellín" data-barrio="El Poblado" data-tipo="Lote">
            <div class="card-image">
              <img src="assets/images/anuncio023/1.jpg" alt="Lote">
              <span class="badge badge-venta">Venta</span>
              <button class="btn-favorite" aria-label="Favorito"><span class="material-symbols-rounded">favorite</span></button>
            </div>
            <div class="card-body">
              <div class="card-header-row">
                <h3 class="property-type">Lote</h3>
                <span class="property-code"><cod:023></cod:023></span>
              </div>
              <p class="property-location"><span class="material-symbols-rounded">location_on</span>Sta Fe de Ant, La Membrillala</p>
              <div class="card-divider"></div>
              <div class="property-specs">
                <div class="spec-item"><span class="material-symbols-rounded">straighten</span><span>500 m²</span></div>
              </div>
              <p class="property-desc">Descubra la vida urbana en su maxima expresion con este espectacular lote a estrenar ubicado en Santa Fe ...</p>
            </div>
            <div class="card-footer">
              <span class="property-price">$ 15.000.000</span>
              <a href="detalle023.html" class="btn-detail">ver detalle</a>

            </div>
          </div>

        

  </main>

  <footer></footer>

  <script src="./assets/js/anuncio.js" defer></script>
  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/navegacion.js"></script>

</body>
</html>
