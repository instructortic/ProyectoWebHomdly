<body>

  <header class="header"></header>

  <main>
    <section class="properties-section">
      <div class="container">

        <!-- ===== TABS ===== -->
        <div class="tabs">
          <button class="tab active" data-tab="arriendo" onclick="setTab(this)">Arriendos</button>
          <button class="tab tab-compra" data-tab="compra" onclick="setTab(this)">Compra</button>
        </div>

        <!-- ===== FILTROS ===== -->
        <div class="filter-bar">
          <div class="filter-select">
            <select id="dep" onchange="actualizarMunicipios()">
              <option value="">Departamentos</option>
              <option>Antioquia</option>
              <option>Cundinamarca</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="mun">
              <option value="">Municipio</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="barrio">
              <option value="">Barrios</option>
              <option>El Poblado</option>
              <option>Laureles</option>
              <option>Chapinero</option>
            </select>
          </div>
          <div class="filter-select">
            <select id="tipo">
              <option value="">Tipo de propiedad</option>
              <option>Apartamento</option>
              <option>Casa</option>
              <option>Lote</option>
            </select>
          </div>
          <input type="text" id="codigo" placeholder="Código">
          <button class="btn-buscar" onclick="buscar()">Buscar</button>
        </div>

        <!-- ===== TÍTULO ===== -->
        <h2 class="section-title">Propiedades disponibles</h2>

        <!-- ===== GRID ===== -->
        <div class="properties-grid" id="propertiesGrid">

          
          <!-- CARD 2 – Casa / Alquiler -->
          <div class="property-card" data-modalidad="arriendo" data-dep="Antioquia" data-mun="Medellín" data-barrio="Laureles" data-tipo="Casa">
            <div class="card-image">
              <img src="assets/images/Img012/1.jpeg" alt="Apartaestudio">
              <span class="badge badge-alquiler">Venta</span>
              <button class="btn-favorite" aria-label="Favorito"><span class="material-symbols-rounded">favorite</span></button>
            </div>
            <div class="card-body">
              <div class="card-header-row">
                <h3 class="property-type">Lote</h3>
                <span class="property-code">cod:012</span>
              </div>
              <p class="property-location"><span class="material-symbols-rounded">location_on</span>Sta Fe de Ant, Membrillala</p>
              <div class="card-divider"></div>
              <div class="property-specs">
                <div class="spec-item"><span class="material-symbols-rounded">straighten</span><span>1200 m²</span></div>
                
              </div>
            </div>
            <div class="card-footer">
              <span class="property-price">$ 120.000.000</span>
              <a href="detalle-lote-012.html" class="btn-detalle">Ver Detalle</a>
            </div>
          </div>

          

        </div><!-- /properties-grid -->

        <!-- Sin resultados -->
        <div class="no-results" id="noResults" style="display:none;">
          <p>No hay propiedades que coincidan con los filtros.</p>
        </div>

      </div>
    </section>
