<body>

  <!-- 
    - #HEADER
  -->
    <header class="header"></header>

  <!-- 
    - #PAGINA DE CONTACTO
  -->

  <section class="contact-section">
    <div class="container d-flex align-items-center justify-content-center">
      <div class="glass-container row no-gutters">
        
        <div class="col-md-6 info-side d-flex flex-column justify-content-center pr-md-5 ">
          <div class="branding-group text-center">
            <img src="assets/images/imgContacto/logo.png" alt="Logo Homdly" class="brand-logo">
            <h1 class="brand-title">HOMDLY</h1>
            <p class="brand-description mb-4 text-justify">
              Si tienes alguna duda, comentario o sugerencia, puedes
              contactarnos y nos comunicaremos contigo lo antes posible.
            </p>

            <div class="social-icons d-flex justify-content-start mb-4 ">
              <a href="#" target="_blank"><img src="assets/images/imgContacto/whatsapp_3599376.png" alt="WhatsApp"></a>
              <a href="#" target="_blank"><img src="assets/images/imgContacto/facebook_1532429.png" alt="Facebook"></a>
              <a href="https://youtube.com/@homdly?si=WbsFvNRfg9l8rFgR" target="_blank"><img src="assets/images/imgContacto/youtube_2582563.png" alt="YouTube"></a>
              <a href="https://www.instagram.com/homdly_inmobiliaria/?igsh=cm1zdjVoeXo2ZDdx&utm_source=qr#" target="_blank"><img src="assets/images/imgContacto/communication_15047584.png" alt="Instagram"></a>
              <a href="https://www.tiktok.com/@inmobiliariahomdly?_r=1&_tZS-95VrYmKFAjy" target="_blank"><img src="assets/images/imgContacto/video_15069740 (1).png" alt="TikTok"></a>
            </div>
          </div>
        </div>

        <div class="col-md-6 form-side pl-md-5 border-left-desktop">
          <h2 class="form-title text-center">Contacto</h2>
          <form autocomplete="off">
            <div class="form-group">
              <input type="text" name="nombre" class="form-control custom-input input-light" placeholder="Nombre completo" required>
            </div>
            <div class="form-group">
              <input type="tel" name="phone" class="form-control custom-input input-light" placeholder="Teléfono" required>
            </div>
            <div class="form-group">
              <input type="email" name="correo" class="form-control custom-input input-light" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group">
              <textarea name="mensaje" class="form-control custom-input input-dark" rows="4" placeholder="Mensaje"></textarea>
            </div>

            <div class="checkbox-container">
              <input name="terminos" type="checkbox" id="terms">
              <label for="terms" class="mb-0">He leído y acepto los términos de condiciones.</label>
            </div>

            <div class="text-center mt-3">
              <button type="submit" class="btn-send">Enviar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- MAPA -->
   
  <div class="map-section">
    <div class="container">
      <h3 class="map-title">Nuestra Ubicación — Santa Fe de Antioquia, Colombia</h3>
      <div class="map-wrapper">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15850.366405391696!2d-75.834417!3d6.558319!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e4422f6d50ec603%3A0x63318991477759a!2sSanta%20Fe%20de%20Antioquia%2C%20Antioquia!5e0!3m2!1ses!2sco!4v1711560000000!5m2!1ses!2sco"
          allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
          title="Mapa Santa Fe de Antioquia">
        </iframe>
      </div>
    </div>
  </div>
